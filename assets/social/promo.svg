<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="hotspotGlowLg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#B91C1C" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#B91C1C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#B91C1C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hotspotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#B91C1C" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#B91C1C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Warm off-white paper -->
  <rect width="1200" height="630" fill="#FBFAF7"/>

  <!-- Top editorial rule -->
  <rect x="0" y="0" width="1200" height="3" fill="#14110F"/>

  <!-- Masthead (newspaper-style top bar) -->
  <g transform="translate(60, 38)">
    <text x="0" y="0" fill="#14110F"
          font-family="'Fraunces','Source Serif Pro',Georgia,serif"
          font-weight="900"
          font-size="20"
          letter-spacing="-0.4">ANDES <tspan font-style="italic" font-weight="500">virus tracker</tspan></text>
  </g>
  <text x="1140" y="55" text-anchor="end" fill="#837D74"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="600"
        font-size="11"
        letter-spacing="2.5">VOL. 01 · LIVE OUTBREAK MONITOR</text>

  <!-- Hairline divider -->
  <line x1="60" y1="80" x2="1140" y2="80" stroke="#E2DED1" stroke-width="0.8"/>

  <!-- Section label (small, editorial) -->
  <text x="60" y="125" fill="#B91C1C"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="700"
        font-size="11"
        letter-spacing="3.5">DISPATCH · 2026 ANDES HANTAVIRUS</text>

  <!-- Editorial headline (large serif, mixed weight) -->
  <text x="60" y="195" fill="#14110F"
        font-family="'Fraunces','Source Serif Pro',Georgia,serif"
        font-weight="700"
        font-size="64"
        letter-spacing="-2.5">A live tracker for the</text>
  <text x="60" y="265" fill="#14110F"
        font-family="'Fraunces','Source Serif Pro',Georgia,serif"
        font-style="italic"
        font-weight="500"
        font-size="64"
        letter-spacing="-2">2026 Andes outbreak.</text>

  <!-- Deck (subhead) -->
  <text x="60" y="320" fill="#4A4641"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="400"
        font-size="20">An independent public-health monitor — cases, fatalities and</text>
  <text x="60" y="348" fill="#4A4641"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="400"
        font-size="20">geographic spread, in real time. Free. No signup. No ads.</text>

  <!-- Hairline divider -->
  <line x1="60" y1="395" x2="1140" y2="395" stroke="#E2DED1" stroke-width="0.8"/>

  <!-- LEFT COLUMN: small editorial map with hotspots -->
  <g transform="translate(60, 425)">
    <text x="0" y="0" fill="#837D74"
          font-family="'Inter','Helvetica Neue',Arial,sans-serif"
          font-weight="700"
          font-size="10"
          letter-spacing="2.5">FIG. 1 · ACTIVE HOTSPOTS</text>

    <!-- Mini world map -->
    <g transform="translate(0, 18)" stroke="#14110F" stroke-width="0.9" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <!-- N. America -->
      <path d="M 30 50 Q 50 30 90 28 Q 130 26 165 40 Q 185 55 188 78 Q 185 95 165 105 Q 145 108 125 105 L 110 115 Q 95 118 82 112 L 70 118 Q 50 115 38 100 Q 25 80 30 50 Z"/>
      <!-- S. America -->
      <path d="M 188 105 Q 205 108 215 130 Q 225 165 218 200 Q 210 225 198 232 L 190 235 Q 180 222 175 200 Q 173 175 178 145 Q 183 120 188 105 Z"/>
      <!-- Europe -->
      <path d="M 330 48 Q 360 42 390 50 Q 405 60 402 75 Q 388 85 370 88 Q 350 88 335 82 Q 320 75 320 60 Q 320 50 330 48 Z"/>
      <!-- Africa -->
      <path d="M 335 100 Q 370 92 395 110 Q 410 140 410 170 Q 400 200 385 215 Q 365 225 348 218 Q 332 205 325 180 Q 320 152 322 125 Q 327 108 335 100 Z"/>
      <!-- Asia -->
      <path d="M 405 45 Q 470 38 540 50 Q 590 60 615 75 Q 630 88 625 105 Q 600 115 555 115 Q 510 115 465 110 Q 425 100 405 90 Q 395 75 395 60 Q 395 50 405 45 Z"/>
      <!-- Australia -->
      <path d="M 590 180 Q 625 175 655 188 Q 670 200 660 215 Q 635 222 605 220 Q 585 215 580 200 Q 578 185 590 180 Z"/>
    </g>

    <!-- Hotspot dots on mini map -->
    <!-- Cape Verde -->
    <g transform="translate(323, 145)">
      <circle r="22" fill="url(#hotspotGlowLg)"/>
      <circle r="4" fill="#B91C1C"/>
    </g>
    <!-- Switzerland -->
    <g transform="translate(355, 95)">
      <circle r="14" fill="url(#hotspotGlow)"/>
      <circle r="2.8" fill="#B91C1C"/>
    </g>
    <!-- Argentina -->
    <g transform="translate(195, 230)">
      <circle r="18" fill="url(#hotspotGlow)"/>
      <circle r="3.5" fill="#B91C1C"/>
    </g>
    <!-- South Africa -->
    <g transform="translate(390, 220)">
      <circle r="14" fill="url(#hotspotGlow)"/>
      <circle r="2.8" fill="#B91C1C"/>
    </g>

    <!-- Caption -->
    <text x="0" y="290" fill="#837D74"
          font-family="'Inter','Helvetica Neue',Arial,sans-serif"
          font-weight="500"
          font-size="11"
          font-style="italic">Confirmed and suspected cases tied to the MV&#160;Hondius cluster.</text>
  </g>

  <!-- Vertical divider between columns -->
  <line x1="700" y1="425" x2="700" y2="585" stroke="#E2DED1" stroke-width="0.8"/>

  <!-- RIGHT COLUMN: features list (no specific stats, no source names) -->
  <g transform="translate(740, 425)">
    <text x="0" y="0" fill="#837D74"
          font-family="'Inter','Helvetica Neue',Arial,sans-serif"
          font-weight="700"
          font-size="10"
          letter-spacing="2.5">WHAT'S INSIDE</text>

    <!-- Feature lines, editorial style -->
    <g font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="14" fill="#14110F">
      <text x="0" y="32" font-weight="600">Live counters</text>
      <text x="125" y="32" fill="#4A4641" font-weight="400">— cases, deaths, countries</text>

      <text x="0" y="62" font-weight="600">Outbreak heatmap</text>
      <text x="155" y="62" fill="#4A4641" font-weight="400">— global hotspot view</text>

      <text x="0" y="92" font-weight="600">Curated news feed</text>
      <text x="160" y="92" fill="#4A4641" font-weight="400">— vetted outlets only</text>

      <text x="0" y="122" font-weight="600">Variant comparison</text>
      <text x="170" y="122" fill="#4A4641" font-weight="400">— Andes vs. other strains</text>

      <text x="0" y="152" font-weight="600">Trilingual</text>
      <text x="100" y="152" fill="#4A4641" font-weight="400">— EN · ES · PT</text>
    </g>
  </g>

  <!-- Bottom thick rule (editorial closer) -->
  <rect x="0" y="600" width="1200" height="3" fill="#14110F"/>

  <!-- Bottom URL bar -->
  <text x="60" y="622" fill="#14110F"
        font-family="'Fraunces','Source Serif Pro',Georgia,serif"
        font-weight="700"
        font-size="14"
        letter-spacing="-0.2">andesvirustracker.github.io</text>
  <text x="1140" y="622" text-anchor="end" fill="#837D74"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="600"
        font-size="10"
        letter-spacing="2.5">INDEPENDENT · NO AFFILIATION</text>
</svg>
