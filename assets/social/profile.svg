<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="paperBg" cx="48%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4F2EC"/>
    </radialGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B91C1C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#B91C1C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Cream paper background -->
  <circle cx="200" cy="200" r="200" fill="url(#paperBg)"/>

  <!-- Editorial rule rings — hairline, restrained -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#C9C2B0" stroke-width="1"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#E2DED1" stroke-width="0.8"/>

  <!-- Top editorial label -->
  <text x="200" y="92" text-anchor="middle"
        fill="#837D74"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="600"
        font-size="11"
        letter-spacing="4.5">EST. 2026 · GLOBAL TRACKER</text>

  <!-- Hairline rule under top label -->
  <line x1="140" y1="105" x2="260" y2="105" stroke="#C9C2B0" stroke-width="0.8"/>

  <!-- Outbreak indicator dot (center, with glow) -->
  <circle cx="200" cy="155" r="35" fill="url(#dotGlow)"/>
  <circle cx="200" cy="155" r="6" fill="#B91C1C"/>

  <!-- Main wordmark — bold serif -->
  <text x="200" y="232" text-anchor="middle"
        fill="#14110F"
        font-family="'Fraunces','Source Serif Pro',Georgia,serif"
        font-weight="900"
        font-size="68"
        letter-spacing="-2">ANDES</text>

  <!-- Italic descriptor — Fraunces italic -->
  <text x="200" y="272" text-anchor="middle"
        fill="#14110F"
        font-family="'Fraunces','Source Serif Pro',Georgia,serif"
        font-style="italic"
        font-weight="500"
        font-size="26"
        letter-spacing="-0.4">virus tracker</text>

  <!-- Hairline rule below wordmark -->
  <line x1="155" y1="295" x2="245" y2="295" stroke="#C9C2B0" stroke-width="0.8"/>

  <!-- Bottom editorial label -->
  <text x="200" y="318" text-anchor="middle"
        fill="#837D74"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="600"
        font-size="10"
        letter-spacing="3">INDEPENDENT · PUBLIC HEALTH</text>
</svg>
