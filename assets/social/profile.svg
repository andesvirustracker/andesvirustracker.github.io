<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="paperBg" cx="50%" cy="48%" r="60%">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4F2EC"/>
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
    <filter id="textShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(20,17,15,0.55)"/>
    </filter>
  </defs>

  <!-- Cream paper circle background -->
  <circle cx="200" cy="200" r="200" fill="url(#paperBg)"/>

  <!-- LARGE particle taking 90% of the profile (360×360 in a 400×400 frame) -->
  <g clip-path="url(#circleClip)">
    <image href="virus-particle-isolated.png"
           x="20" y="20"
           width="360" height="360"
           preserveAspectRatio="xMidYMid meet"/>
  </g>

  <!-- Editorial outer hairline ring -->
  <circle cx="200" cy="200" r="198" fill="none" stroke="#14110F" stroke-width="1" opacity="0.18"/>

  <!-- "ANDES" text in front of particle. White fill + thin dark stroke
       (paint-order: stroke first, then fill) gives a halo that reads on
       any colour underneath. Drop shadow grounds it. -->
  <text x="200" y="227" text-anchor="middle"
        font-family="'Fraunces','Source Serif Pro',Georgia,serif"
        font-weight="900"
        font-size="80"
        letter-spacing="2"
        fill="#FFFFFF"
        stroke="#14110F"
        stroke-width="3"
        stroke-linejoin="round"
        paint-order="stroke fill"
        filter="url(#textShadow)">ANDES</text>
</svg>
