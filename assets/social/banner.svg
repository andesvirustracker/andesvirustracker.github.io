<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <radialGradient id="hotRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#B91C1C" stop-opacity="0.65"/>
      <stop offset="55%"  stop-color="#B91C1C" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#B91C1C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hotOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#EA580C" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#EA580C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#EA580C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hotYellow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#D97706" stop-opacity="0.42"/>
      <stop offset="55%"  stop-color="#D97706" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Warm off-white paper -->
  <rect width="1500" height="500" fill="#FBFAF7"/>

  <!-- Top editorial rule -->
  <rect x="0" y="0" width="1500" height="2" fill="#14110F"/>

  <!-- Brand mark, top-left (well above profile-picture overlap zone) -->
  <g transform="translate(60, 50)">
    <text x="0" y="0"
          font-family="'Fraunces','Source Serif Pro',Georgia,serif"
          font-weight="900"
          font-size="34"
          letter-spacing="-0.6"
          fill="#14110F">ANDES <tspan font-style="italic" font-weight="500">virus tracker</tspan></text>
  </g>

  <!-- ===== WORLD HEAT MAP ===== -->
  <!-- Map sits in centre-left, comfortably clear of the bottom-left
       profile-picture overlap zone. Continent silhouettes are clean line
       art so the colour-coded heat dots read clearly on top. -->
  <g transform="translate(160, 110) scale(0.78)"
     stroke="#14110F" stroke-width="1.1" fill="none"
     stroke-linejoin="round" stroke-linecap="round">

    <!-- North America -->
    <path d="M 60 100 Q 90 60 160 55 Q 230 50 290 75 Q 330 100 340 145 Q 335 175 305 195 Q 275 200 245 195 L 220 215 Q 195 220 175 210 L 150 220 Q 110 215 85 190 Q 60 155 60 100 Z"/>
    <!-- Greenland -->
    <path d="M 360 50 Q 390 45 410 60 Q 415 80 395 95 Q 370 95 360 80 Q 355 65 360 50 Z"/>
    <!-- Central America -->
    <path d="M 290 200 Q 305 220 325 235 Q 345 250 345 270 Q 330 270 315 260 Q 300 240 290 220 Z"/>
    <!-- South America -->
    <path d="M 340 245 Q 370 250 390 285 Q 405 340 395 405 Q 380 460 360 480 L 345 490 Q 330 470 320 425 Q 315 365 325 305 Q 335 270 340 245 Z"/>
    <!-- UK / Ireland -->
    <path d="M 580 90 Q 595 90 600 105 Q 595 118 583 118 Q 572 110 575 95 Q 575 90 580 90 Z"/>
    <!-- Europe -->
    <path d="M 600 90 Q 660 80 715 95 Q 745 110 740 140 Q 720 160 685 165 Q 645 165 615 155 Q 585 140 580 115 Q 580 95 600 90 Z"/>
    <!-- Iberia -->
    <path d="M 565 165 Q 595 165 615 180 Q 615 200 590 200 Q 565 195 555 180 Q 555 168 565 165 Z"/>
    <!-- Africa -->
    <path d="M 610 195 Q 680 185 720 220 Q 745 270 745 325 Q 730 380 700 410 Q 670 425 645 415 Q 615 395 600 350 Q 590 295 595 240 Q 600 210 610 195 Z"/>
    <!-- Madagascar -->
    <path d="M 770 350 Q 785 350 790 375 Q 790 395 775 400 Q 765 390 765 370 Q 765 355 770 350 Z"/>
    <!-- Asia (mainland) -->
    <path d="M 740 80 Q 850 70 970 90 Q 1080 105 1140 130 Q 1180 150 1175 180 Q 1140 200 1080 200 Q 990 200 900 195 Q 815 185 760 165 Q 735 145 730 115 Q 730 90 740 80 Z"/>
    <!-- Indian subcontinent -->
    <path d="M 920 200 Q 950 200 970 220 Q 985 250 970 280 Q 945 295 925 280 Q 905 250 905 225 Q 905 205 920 200 Z"/>
    <!-- SE Asia -->
    <path d="M 1060 215 Q 1100 215 1115 240 Q 1115 260 1095 270 Q 1070 265 1055 245 Q 1050 225 1060 215 Z"/>
    <!-- Indonesia / Philippines -->
    <path d="M 1110 290 Q 1145 280 1180 290 Q 1195 305 1175 315 Q 1140 320 1115 310 Q 1100 300 1110 290 Z"/>
    <path d="M 1155 245 Q 1175 245 1180 260 Q 1175 275 1160 275 Q 1148 268 1148 255 Q 1148 247 1155 245 Z"/>
    <!-- Australia -->
    <path d="M 850 320 Q 920 310 970 340 Q 990 370 960 390 Q 900 400 860 385 Q 830 365 850 320 Z"/>
    <!-- Japan -->
    <path d="M 1195 145 Q 1210 145 1215 165 Q 1215 180 1200 185 Q 1185 175 1185 160 Q 1185 148 1195 145 Z"/>
  </g>

  <!-- Equator hairline (decorative, editorial) -->
  <line x1="160" y1="307" x2="1080" y2="307"
        stroke="#E2DED1" stroke-width="0.6" stroke-dasharray="3,5"/>

  <!-- ===== HEAT DOTS — colour-coded by activity level ===== -->
  <!-- Coordinates derived from the map transform translate(160,110) scale(0.78) -->

  <!-- 🔴 Red = active confirmed cases -->
  <!-- Argentina (Buenos Aires province ≈ map(240, 420)) -->
  <g transform="translate(348, 438)">
    <circle r="38" fill="url(#hotRed)"/>
    <circle r="7" fill="#B91C1C"/>
    <circle r="7" fill="none" stroke="#FBFAF7" stroke-width="1.4"/>
  </g>
  <!-- MV Hondius / off Cape Verde (Atlantic ≈ map(370, 215)) -->
  <g transform="translate(449, 278)">
    <circle r="42" fill="url(#hotRed)"/>
    <circle r="7.5" fill="#B91C1C"/>
    <circle r="7.5" fill="none" stroke="#FBFAF7" stroke-width="1.4"/>
  </g>

  <!-- 🟠 Orange = confirmed but contained -->
  <!-- Switzerland (≈ map(553, 113)) -->
  <g transform="translate(591, 198)">
    <circle r="28" fill="url(#hotOrange)"/>
    <circle r="5.5" fill="#EA580C"/>
    <circle r="5.5" fill="none" stroke="#FBFAF7" stroke-width="1.2"/>
  </g>
  <!-- South Africa (≈ map(670, 380)) -->
  <g transform="translate(683, 406)">
    <circle r="28" fill="url(#hotOrange)"/>
    <circle r="5.5" fill="#EA580C"/>
    <circle r="5.5" fill="none" stroke="#FBFAF7" stroke-width="1.2"/>
  </g>

  <!-- 🟡 Yellow = surveillance / monitoring -->
  <!-- Chile (next to Argentina, ≈ map(225, 410)) -->
  <g transform="translate(336, 430)">
    <circle r="22" fill="url(#hotYellow)"/>
    <circle r="4" fill="#D97706"/>
  </g>
  <!-- Brazil (≈ map(310, 320)) -->
  <g transform="translate(402, 360)">
    <circle r="22" fill="url(#hotYellow)"/>
    <circle r="4" fill="#D97706"/>
  </g>
  <!-- Spain (Iberia, ≈ map(580, 175)) -->
  <g transform="translate(612, 246)">
    <circle r="22" fill="url(#hotYellow)"/>
    <circle r="4" fill="#D97706"/>
  </g>
  <!-- Namibia (south of South Africa, ≈ map(640, 350)) -->
  <g transform="translate(659, 383)">
    <circle r="20" fill="url(#hotYellow)"/>
    <circle r="3.5" fill="#D97706"/>
  </g>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(160, 462)" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <g>
      <circle cx="6" cy="0" r="5" fill="#B91C1C"/>
      <text x="20" y="4" font-size="11" font-weight="600" fill="#4A4641" letter-spacing="1.2">ACTIVE</text>
    </g>
    <g transform="translate(95, 0)">
      <circle cx="6" cy="0" r="5" fill="#EA580C"/>
      <text x="20" y="4" font-size="11" font-weight="600" fill="#4A4641" letter-spacing="1.2">CONTAINED</text>
    </g>
    <g transform="translate(220, 0)">
      <circle cx="6" cy="0" r="5" fill="#D97706"/>
      <text x="20" y="4" font-size="11" font-weight="600" fill="#4A4641" letter-spacing="1.2">SURVEILLANCE</text>
    </g>
  </g>

  <!-- ===== PARTICLE on the right ===== -->
  <image href="virus-particle-isolated.png"
         x="1080" y="55"
         width="380" height="380"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Tiny URL bottom-right, editorial -->
  <text x="1440" y="475" text-anchor="end"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="600"
        font-size="13"
        letter-spacing="1"
        fill="#837D74">andesvirustracker.github.io</text>

  <!-- Bottom editorial rule -->
  <rect x="0" y="498" width="1500" height="2" fill="#14110F"/>
</svg>
