<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <clipPath id="virusCircle">
      <circle cx="1180" cy="250" r="190"/>
    </clipPath>
    <filter id="imgShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="rgba(20,17,15,0.18)"/>
    </filter>
    <radialGradient id="innerVignette" cx="50%" cy="50%" r="55%">
      <stop offset="65%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#14110F" stop-opacity="0.28"/>
    </radialGradient>
    <radialGradient id="echoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#B91C1C" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#B91C1C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Warm off-white paper -->
  <rect width="1500" height="500" fill="#FBFAF7"/>

  <!-- Top editorial rule -->
  <rect x="0" y="0" width="1500" height="2" fill="#14110F"/>

  <!-- Brand mark, top-left (above profile-pic overlap zone) -->
  <g transform="translate(60, 38)">
    <text x="0" y="0" fill="#14110F"
          font-family="'Fraunces','Source Serif Pro',Georgia,serif"
          font-weight="900"
          font-size="22"
          letter-spacing="-0.5">ANDES <tspan font-style="italic" font-weight="500">virus tracker</tspan></text>
    <text x="0" y="20" fill="#837D74"
          font-family="'Inter','Helvetica Neue',Arial,sans-serif"
          font-weight="600"
          font-size="11"
          letter-spacing="2.5">INDEPENDENT · PUBLIC HEALTH · EST. 2026</text>
  </g>

  <!-- Hairline divider under brand -->
  <line x1="60" y1="92" x2="900" y2="92" stroke="#E2DED1" stroke-width="0.8"/>

  <!-- Section label -->
  <text x="60" y="155" fill="#B91C1C"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="700"
        font-size="11"
        letter-spacing="3.5">DISPATCH · 2026 ANDES HANTAVIRUS</text>

  <!-- Editorial headline (mixed-weight serif) -->
  <text x="60" y="225" fill="#14110F"
        font-family="'Fraunces','Source Serif Pro',Georgia,serif"
        font-weight="700"
        font-size="48"
        letter-spacing="-1.5">Live tracking of the</text>
  <text x="60" y="280" fill="#14110F"
        font-family="'Fraunces','Source Serif Pro',Georgia,serif"
        font-style="italic"
        font-weight="500"
        font-size="48"
        letter-spacing="-1.2">Andes hantavirus outbreak.</text>

  <!-- Subhead / supporting line -->
  <text x="60" y="320" fill="#4A4641"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="400"
        font-size="15"
        letter-spacing="0.1">An independent public-health monitor — checked every 30 minutes.</text>

  <!-- Subtle echo glows behind the main image circle (suggests the cluster motif from the photo) -->
  <circle cx="930"  cy="135" r="55" fill="url(#echoGlow)"/>
  <circle cx="1395" cy="380" r="65" fill="url(#echoGlow)"/>

  <!-- Image frame: thin outer ring -->
  <circle cx="1180" cy="250" r="195" fill="#F4F2EC"/>

  <!-- The realistic virus photograph, circular-cropped -->
  <g filter="url(#imgShadow)" clip-path="url(#virusCircle)">
    <image href="virus-particle.jpg"
           x="990" y="60"
           width="380" height="380"
           preserveAspectRatio="xMidYMid slice"/>
    <!-- Inner vignette for editorial integration -->
    <rect x="990" y="60" width="380" height="380" fill="url(#innerVignette)"/>
  </g>

  <!-- Hairline ring around image (editorial frame) -->
  <circle cx="1180" cy="250" r="190" fill="none" stroke="#14110F" stroke-width="1" opacity="0.35"/>
  <circle cx="1180" cy="250" r="200" fill="none" stroke="#14110F" stroke-width="0.5" opacity="0.18"/>

  <!-- Tiny editorial caption next to image -->
  <text x="975" y="453" text-anchor="end" fill="#837D74"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="600"
        font-size="10"
        letter-spacing="2"
        font-style="italic">FIG. 1 · ANDES HANTAVIRUS PARTICLE</text>

  <!-- URL — bottom right, editorial -->
  <g transform="translate(60, 458)">
    <text x="0" y="0" fill="#14110F"
          font-family="'Fraunces','Source Serif Pro',Georgia,serif"
          font-weight="700"
          font-size="16"
          letter-spacing="-0.2">andesvirustracker.github.io</text>
  </g>

  <!-- Bottom editorial rule -->
  <rect x="0" y="498" width="1500" height="2" fill="#14110F"/>
</svg>
